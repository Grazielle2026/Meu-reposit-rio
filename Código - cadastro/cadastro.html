<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Página de cadastro</h1>

    <form action="Formulário">
        <label for="primeironome">Nome: </label>
        <input type="text" name="Primeiro Nome" id="primeironome"><br>

        <label for="sobrenome">Sobrenome: </label>
        <input type="text" name="Sobrenome" id="sobrenome"><br>

    <label for="genero">Gênero: </label>

        <label for="masc">Masculino</label>
        <input type="radio" name="genero" id="masc"></br>

         <label for="fem">Feminino</label>
         <input type="radio" name="genero" id="fem"></br>

         <label for="outro">Outro</label>
         <input type="radio" name="genero" id="outro"></br>

        <label for="email">E-mail: </label>
        <input type="email" name="E-mail" id="email"></br>

        <label for="tel">Telefone</label>
        <input type="tel" name="Telefone" id="tel"></br>

        <label for="senha">Senha:</label>
        <input type="password" name="Password" id="senha"></br>

        <input type="checkbox" name="Termos e Condições" id=""> 
        <label for="aceite">Termos de Condições</label>
        
        <button>Enviar</button>
    </form>
    
</body>
</html>
